# Sleeper configuration
# Saved by Config Editor — changes auto-reload.

check_interval: 0.5
override_max_minutes: 60
log_dir: logs
time_windows:
  - name: Night Limit 1
    start_time: "00:00"
    end_time: "06:00"
    mode: whitelist
    force_kill: false
    app_list:
      - explorer.exe
      - cmd.exe
      - powershell.exe
      - python.exe
      - pythonw.exe
  - name: Night Limit 2
    start_time: "23:30"
    end_time: "23:59"
    mode: whitelist
    force_kill: false
    app_list:
      - explorer.exe
      - cmd.exe
      - powershell.exe
      - python.exe
      - pythonw.exe
